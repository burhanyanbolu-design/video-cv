version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: videocv-postgres
    environment:
      POSTGRES_DB: videocv_prod
      POSTGRES_USER: videocv
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    volumes:
      - videocv-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videocv"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: videocv-redis
    ports:
      - "6380:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: videocv-api
    env_file:
      - .env.production
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  videocv-postgres-data:
